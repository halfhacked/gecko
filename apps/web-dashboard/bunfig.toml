[test]
coverageSkipTestFiles = true
preload = ["./src/__tests__/preload.ts"]

# Only search for tests in src/__tests__ directory
root = "src/__tests__"

# Exclude pure-JSX UI components from coverage — they require DOM/React
# renderer to execute and cannot be unit-tested in Bun's server-side runtime.
# Business logic extracted from these components IS tested separately.
coveragePathIgnorePatterns = [
  "src/__tests__/preload.ts",
  "src/components/ui/avatar.tsx",
  "src/components/ui/tooltip.tsx",
  "src/components/layout/sidebar-context.tsx",
]

[test.coverageThreshold]
line = 90
function = 85
